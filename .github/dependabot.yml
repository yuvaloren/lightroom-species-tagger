# Keep dependencies current with small, CI-gated PRs.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  # The Node Lens helper (puppeteer-core). Its lockfile is committed, so updates
  # are reproducible and go through the same CI gate as any other change.
  - package-ecosystem: "npm"
    directory: "/scripts/lens"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    groups:
      lens-helper:
        patterns: ["*"]

  # GitHub Actions used by the CI/release workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
