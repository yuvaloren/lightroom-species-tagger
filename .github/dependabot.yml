# Keep dependencies current with small, CI-gated PRs.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  # The Go lens helper's dependencies (coder/websocket). go.mod/go.sum are
  # committed, so updates are reproducible and CI-gated like any other change.
  # (The go/toolchain PIN is invisible to Dependabot — that's what
  # .github/workflows/go-eol.yml is for.)
  - package-ecosystem: "gomod"
    directory: "/src/helper"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    groups:
      lens-helper:
        patterns: ["*"]

  # GitHub Actions used by the CI/release workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]
