name: Go toolchain EOL guard

# The Go pinned in helper/go.mod is a CUSTOM pin Dependabot cannot see — the
# same blind spot that once shipped an EOL Node runtime with no alarm. This
# workflow runs scripts/check-go-eol.sh weekly (and whenever the pin changes)
# so the repo goes red the moment the pinned Go cycle drops out of support.

on:
  schedule:
    - cron: '0 15 * * 1' # Mondays 15:00 UTC = 8am Pacific
  push:
    branches: [ main ]
    paths:
      - 'helper/go.mod'
      - 'scripts/check-go-eol.sh'
      - '.github/workflows/go-eol.yml'
  pull_request:
    paths:
      - 'helper/go.mod'
      - 'scripts/check-go-eol.sh'
      - '.github/workflows/go-eol.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check the pinned Go toolchain against its EOL schedule
        run: bash scripts/check-go-eol.sh
