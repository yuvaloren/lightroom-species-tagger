name: Node runtime EOL guard

# The bundled Node runtime is a CUSTOM pin (NODE_VERSION in build/build.lua) that
# Dependabot cannot see — v0.1.0 shipped Node 20 two months after its EOL and no
# alarm fired. This workflow runs scripts/check-node-eol.sh weekly (and whenever
# the pin changes) so the repo goes red the moment the bundled runtime is EOL,
# within 60 days of it, or out of sync with scripts/lens/.nvmrc.

on:
  schedule:
    - cron: '0 15 * * 1' # Mondays 15:00 UTC = 8am Pacific
  push:
    branches: [ main ]
    paths:
      - 'build/build.lua'
      - 'scripts/lens/.nvmrc'
      - 'scripts/check-node-eol.sh'
      - '.github/workflows/node-eol.yml'
  pull_request:
    paths:
      - 'build/build.lua'
      - 'scripts/lens/.nvmrc'
      - 'scripts/check-node-eol.sh'
      - '.github/workflows/node-eol.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check the bundled Node runtime against its EOL schedule
        run: bash scripts/check-node-eol.sh
