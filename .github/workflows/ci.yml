name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

# Least privilege by default: nothing needs write except the release job, which
# opts back in explicitly. Third-party actions inherit only read.
permissions:
  contents: read

jobs:
  # ── Lua: lint + unit/accuracy tests + build the distributable bundle ──────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history + tags

      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.1.5"

      - uses: leafo/gh-actions-luarocks@v6

      - name: Install Lua tooling
        # luacheck is pinned because the gate is "0 warnings" — a new luacheck
        # release could otherwise flip a green PR red with no source change. Keep
        # this in lock-step with dev-setup.sh and the justfile `deps` recipe.
        run: luarocks install luacheck 1.2.0 && luarocks install busted && luarocks install luacov && luarocks install luafilesystem

      - name: Fetch dependencies (pulls the pinned dkjson)
        run: lua build/build.lua --fetch-deps

      - name: Lint
        run: luacheck src spec scripts

      - name: Test
        run: busted

      - name: Coverage (report-only)
        continue-on-error: true
        run: |
          busted --coverage
          luacov
          tail -n 30 luacov.report.out || true

      # Node deps for the Lens helper, so the built bundle is self-contained
      # (end users unzip and run — no npm needed). puppeteer-core is pure JS.
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/lens/package-lock.json
      - name: Install the Lens helper deps (bundled into the release)
        run: cd scripts/lens && npm ci

      - name: Version drift guard (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::git tag ($TAG) does not match VERSION file ($FILE)"; exit 1
          fi
          if ! grep -q "## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' heading"; exit 1
          fi
          echo "version ok: $TAG"

      - name: Build bundle (includes the Lens helper + its node_modules)
        run: lua build/build.lua
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Smoke-check the built bundle
        # Cheap guard that the composed .lrplugin is well-formed before it can be
        # attached to a release: the entry files exist, the stamped Lua parses, the
        # Lens helper + its deps are bundled, and every zip is intact.
        run: |
          set -euo pipefail
          B=output/dist/SpeciesTagger.lrplugin
          for f in Info.lua Version.lua TagSpecies.lua Config.lua dkjson.lua lens/lens-search.js; do
            test -f "$B/$f" || { echo "::error::missing $B/$f"; exit 1; }
          done
          test -d "$B/lens/node_modules/puppeteer-core" || { echo "::error::Lens helper deps not bundled"; exit 1; }
          lua -e 'assert(loadfile("output/dist/SpeciesTagger.lrplugin/Info.lua"))'
          lua -e 'assert(loadfile("output/dist/SpeciesTagger.lrplugin/Version.lua"))'
          for z in output/dist/*.zip; do unzip -t "$z" >/dev/null && echo "ok: $z"; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lrplugin
          path: |
            output/dist/*.zip
            output/dist/checksums.txt

  # ── Node: drive the REAL Lens helper against a local fake Google (no network) ──
  lens-helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/lens/package-lock.json
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome
      - name: Install the Lens helper deps
        run: cd scripts/lens && npm ci
      - name: Interactive challenge-flow + overlay tests (fake Google, headless)
        env:
          LENS_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: cd scripts/lens && npm test

  # ── macOS: universal-Node + Developer ID sign + notarize (v* tags only) ───────
  # Turns the composed bundle into the signed, notarized release zip that actually
  # runs on a downloader's Mac — an unsigned, quarantined Node binary is Gatekeeper-
  # blocked on first launch. Composes on the runner (so it has the arm64 slice to
  # lipo against), then hands off to scripts/sign-macos.sh. Inert until the signing
  # secrets exist (see docs/SIGNING.md): with none set the sign step fails, so a tag
  # never ships an unsigned zip; regular push/PR CI is unaffected (tag-gated).
  notarize-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, lens-helper]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.1.5"
      - uses: leafo/gh-actions-luarocks@v6
      - name: Install the Lua build dependency
        run: luarocks install luafilesystem

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scripts/lens/package-lock.json
      - name: Bundle the Lens helper deps
        run: cd scripts/lens && npm ci

      - name: Compose the release bundle (darwin arm64 + win-x64)
        run: lua build/build.lua --no-zip
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ST_NODE_PLATFORMS: darwin-arm64,win-x64

      - name: Universal Node + sign + notarize + package
        run: bash scripts/sign-macos.sh
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}

      - name: Upload the signed bundle
        uses: actions/upload-artifact@v7
        with:
          name: lrplugin-signed
          path: |
            output/dist/*.zip
            output/dist/checksums.txt

  # ── Release (v* tags only): publish ONLY if build, lens-helper, and notarize are green ──
  # Separate, least-privilege job so a tag can never publish a GitHub Release while a
  # gate is red. Publishes the macOS-signed bundle (the one that runs on a downloader's Mac).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, lens-helper, notarize-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history + tags

      - name: Download the signed bundle
        uses: actions/download-artifact@v8
        with:
          name: lrplugin-signed
          path: output/dist

      - name: Generate release notes
        id: cliff
        continue-on-error: true
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.cliff.outputs.content }}
          generate_release_notes: true
          files: |
            output/dist/*.zip
            output/dist/checksums.txt
