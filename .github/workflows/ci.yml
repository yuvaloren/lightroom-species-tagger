name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

# CI is validation-only: it never signs and never publishes. Releases are cut
# locally by ./release.sh (sign + notarize + package + gh release create) so the
# signing identity and notary credentials never live in GitHub secrets — see
# docs/SIGNING.md. Nothing here needs write access.
permissions:
  contents: read

jobs:
  # ── Lua: lint + unit/accuracy tests + build the distributable bundle ──────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history + tags

      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.1.5"

      - uses: leafo/gh-actions-luarocks@v6

      - name: Install Lua tooling
        # luacheck is pinned because the gate is "0 warnings" — a new luacheck
        # release could otherwise flip a green PR red with no source change. Keep
        # this in lock-step with dev-setup.sh and the justfile `deps` recipe.
        run: luarocks install luacheck 1.2.0 && luarocks install busted && luarocks install luacov && luarocks install luafilesystem

      - name: Fetch dependencies (pulls the pinned dkjson)
        run: lua build/build.lua --fetch-deps

      - name: Lint
        run: luacheck src spec scripts

      - name: Test
        run: busted

      - name: Coverage (report-only)
        continue-on-error: true
        run: |
          busted --coverage
          luacov
          tail -n 30 luacov.report.out || true

      # Node deps for the Lens helper, so the built bundle is self-contained
      # (end users unzip and run — no npm needed). puppeteer-core is pure JS.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: scripts/lens/package-lock.json
      - name: Install the Lens helper deps (bundled into the release)
        run: cd scripts/lens && npm ci

      - name: Version drift guard (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::git tag ($TAG) does not match VERSION file ($FILE)"; exit 1
          fi
          if ! grep -q "## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' heading"; exit 1
          fi
          echo "version ok: $TAG"

      - name: Build bundle (includes the Lens helper + its node_modules)
        run: lua build/build.lua
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Smoke-check the built bundle
        # Cheap guard that the composed .lrplugin is well-formed and the three
        # per-platform zips (scripts/package-zips.sh) each ship exactly their own
        # OS's Node runtime: the entry files exist, the stamped Lua parses, the
        # Lens helper + its deps are bundled, and every zip is intact.
        run: |
          set -euo pipefail
          B=output/dist/SpeciesTagger.lrplugin
          for f in Info.lua Version.lua TagSpecies.lua Config.lua dkjson.lua lens/lens-search.js; do
            test -f "$B/$f" || { echo "::error::missing $B/$f"; exit 1; }
          done
          test -d "$B/lens/node_modules/puppeteer-core" || { echo "::error::Lens helper deps not bundled"; exit 1; }
          # every bundled Node binary must embed the pinned version string — catches
          # a stale cache or wrong archive (v0.2.0 shipped Node 20 this way)
          NV="$(grep -oE "NODE_VERSION = 'v[0-9][0-9.]*'" build/build.lua | grep -oE 'v[0-9][0-9.]*' | head -1)"
          for bin in "$B"/node/*/node*; do
            grep -aq "$NV" "$bin" || { echo "::error::$bin does not embed $NV — stale Node runtime"; exit 1; }
          done
          lua -e 'assert(loadfile("output/dist/SpeciesTagger.lrplugin/Info.lua"))'
          lua -e 'assert(loadfile("output/dist/SpeciesTagger.lrplugin/Version.lua"))'
          for v in mac win all; do
            set -- output/dist/SpeciesTagger-*-"$v".zip
            test -f "$1" || { echo "::error::missing the -$v zip"; exit 1; }
            unzip -t "$1" >/dev/null || { echo "::error::corrupt zip: $1"; exit 1; }
          done
          set -- output/dist/SpeciesTagger-*-mac.zip; MAC="$1"
          set -- output/dist/SpeciesTagger-*-win.zip; WIN="$1"
          set -- output/dist/SpeciesTagger-*-all.zip; ALL="$1"
          unzip -l "$MAC" | grep -q 'node/darwin-' || { echo "::error::mac zip ships no darwin Node"; exit 1; }
          if unzip -l "$MAC" | grep -q 'node\.exe'; then echo "::error::mac zip contains node.exe"; exit 1; fi
          unzip -l "$WIN" | grep -q 'node\.exe' || { echo "::error::win zip ships no node.exe"; exit 1; }
          if unzip -l "$WIN" | grep -q 'node/darwin-'; then echo "::error::win zip contains a darwin Node"; exit 1; fi
          unzip -l "$ALL" | grep -q 'node/darwin-' || { echo "::error::all zip is missing the darwin Node"; exit 1; }
          unzip -l "$ALL" | grep -q 'node\.exe' || { echo "::error::all zip is missing node.exe"; exit 1; }
          echo "zips ok: $(basename "$MAC") $(basename "$WIN") $(basename "$ALL")"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lrplugin
          path: |
            output/dist/*.zip
            output/dist/checksums.txt

  # ── Node: drive the REAL Lens helper against a local fake Google (no network) ──
  lens-helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: scripts/lens/package-lock.json
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome
      - name: Install the Lens helper deps
        run: cd scripts/lens && npm ci
      - name: Interactive challenge-flow + overlay tests (fake Google, headless)
        env:
          LENS_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: cd scripts/lens && npm test
