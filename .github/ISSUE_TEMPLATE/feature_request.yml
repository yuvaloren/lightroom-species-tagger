name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? A rough sketch is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other designs you weighed.
  - type: checkboxes
    id: fit
    attributes:
      label: Fit with the project
      description: >
        This plugin deliberately stays a focused, deterministic species tagger with
        a pure/tested core and a single recognition provider seam. Not every idea fits —
        that's fine, say so.
      options:
        - label: I've read the README's "What it does" / "Limitations" and think this fits the project's scope.
