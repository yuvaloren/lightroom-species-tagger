<!doctype html>
<html>
<head><meta charset="utf-8"><title>Before you continue to Google</title></head>
<body>
  <!-- Mimics a Google anti-bot / consent interstitial: the recaptcha element +
       title are what assessConfidence() keys on (NOT the body text), so this is
       classified as "challenged". The server injects an auto-advance or a button
       handler depending on the ?solve= query (see test/integration.test.js). -->
  <h1>Our systems have detected unusual traffic from your network</h1>
  <p>To continue, please verify you are not a robot.</p>
  <div class="g-recaptcha" data-sitekey="test-sitekey"></div>
  <form id="captcha-form" action="/sorry/index">
    <button type="button" id="solve">I'm not a robot</button>
  </form>
</body>
</html>
